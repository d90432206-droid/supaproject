name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            -f /tmp/backup.dump

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > /tmp/service_account.json
          FILENAME="supabase_backup_$(date +%Y%m%d_%H%M%S).dump"
          cp /tmp/backup.dump /tmp/$FILENAME
          rclone copy /tmp/$FILENAME \
            ":drive,service_account_file=/tmp/service_account.json,scope=drive,root_folder_id=$GDRIVE_FOLDER_ID:" \
            --drive-acknowledge-abuse
          echo "備份完成：$FILENAME"
