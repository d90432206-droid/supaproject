name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            -f /tmp/backup.dump
      - name: Install Google API client
        run: pip install google-api-python-client google-auth

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python3 << 'EOF'
          import os
          import json
          from datetime import datetime
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          creds_info = json.loads(os.environ['GDRIVE_CREDENTIALS'])
          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )

          service = build('drive', 'v3', credentials=creds)

          filename = f"supabase_backup_{datetime.now().strftime('%Y%m%d_%H%M%S')}.dump"
          file_metadata = {
              'name': filename,
              'parents': [os.environ['GDRIVE_FOLDER_ID']]
          }
          media = MediaFileUpload('/tmp/backup.dump', mimetype='application/octet-stream')
          service.files().create(body=file_metadata, media_body=media).execute()
          print(f"備份完成：{filename}")
          EOF
