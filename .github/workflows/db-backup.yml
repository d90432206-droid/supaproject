name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Backup Chuyi database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            -f /tmp/chuyi_backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Backup linequotation database
        env:
          DATABASE_URL_2: ${{ secrets.DATABASE_URL_2 }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL_2" \
            --format=custom \
            --no-acl \
            --no-owner \
            -f /tmp/linequotation_backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backups_$(date +%Y%m%d)
          path: /tmp/*_backup_*.dump
          retention-days: 90
